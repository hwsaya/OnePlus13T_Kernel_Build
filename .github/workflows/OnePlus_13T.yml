name: OnePlus 13T Kernel Build

on:
  workflow_dispatch:
    inputs:
      ksu_version:  
        description: "KernelSU 版本 (默认留空使用最新稳定版，可指定分支名、Tag 或 commit hash)，none 则不集成"
        required: false
        type: string
        default: ""
      pull_kernel_src:
        description: "是否拉取远程内核源码(否则使用缓存)"
        required: false
        type: boolean
        default: false
      Apply_SCHED:
        description: "是否添加风驰驱动"
        required: false
        type: boolean
        default: false
      enable_adios:
        description: "是否启用 ADIOS IO 调度器"
        required: false
        type: boolean
        default: false
      better_net:
        description: "是否开启网络功能增强配置"
        required: false
        type: boolean
        default: false
      enable_Droidspaces:
        description: "是否启用 Droidspaces (Linux 容器支持)"
        required: false
        type: boolean
        default: false
      enable_ntsync:
        description: "是否启用 NTsync (依赖 Droidspaces)"
        required: false
        type: boolean
        default: false
      baseband_guard:
        description: "是否开启内核级基带保护"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: OnePlus 13T Kernel Build
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "none"
      CCACHE_COMPRESS: "1"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_DIR: ${{ github.workspace }}/.ccache_oneplus_13t
      CCACHE_MAXSIZE: "5G"

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get install -y --no-install-recommends libelf-dev tree dos2unix ccache

      - name: Restore kernel source
        id: kernel-src-cache
        uses: actions/cache/restore@v5
        with:
          path: kernel_workspace/kernel_platform/common
          key: kernel-src-v6.6.89

      - name: Restore prebuilts (clang & build-tools)
        id: prebuilts-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928
            kernel_workspace/kernel_platform/prebuilts/kernel-build-tools/linux-x86
          key: prebuilts-${{ runner.os }}

      - name: Configure Git and repo
        run: |
          git config --global user.email "bot@kernelsu.org"
          git config --global user.name "KernelSUBot"
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/sm8750 -m oneplus_13t_b.xml --depth=1

          if [ "${{ inputs.pull_kernel_src }}" = "true" ] || \
             [ "${{ steps.kernel-src-cache.outputs.cache-hit }}" != "true" ]; then
            repo sync kernel_platform/common \
              -c --force-sync --optimized-fetch --prune --no-tags --no-clone-bundle \
              -j$(nproc --all)
          fi

          if [ "${{ steps.prebuilts-cache.outputs.cache-hit }}" != "true" ]; then
            repo sync kernel_platform/prebuilts/clang/host/linux-x86 \
                      kernel_platform/prebuilts/kernel-build-tools \
              -c --force-sync --optimized-fetch --prune --no-tags --no-clone-bundle \
              -j$(nproc --all)
          fi

          rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"

      - name: Save kernel source
        if: ${{ !cancelled() && (inputs.pull_kernel_src == 'true' || steps.kernel-src-cache.outputs.cache-hit != 'true') }}
        uses: actions/cache/save@v5
        with:
          path: kernel_workspace/kernel_platform/common
          key: kernel-src-v6.6.89

      - name: Save prebuilts (clang & build-tools)
        if: ${{ !cancelled() && steps.prebuilts-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928
            kernel_workspace/kernel_platform/prebuilts/kernel-build-tools/linux-x86
          key: prebuilts-${{ runner.os }}

      - name: Apply OGKI to GKI or SCHED
        run: |
          if [ "${{ inputs.Apply_SCHED }}" = "true" ]; then
            echo "[+] 应用风驰驱动 (SCHED)"
            git clone https://github.com/Numbersf/SCHED_PATCH.git -b sm8750
            dos2unix SCHED_PATCH/fengchi_oneplus_13t_b.patch
            patch -d kernel_workspace/kernel_platform/common -p1 -F 3 < SCHED_PATCH/fengchi_oneplus_13t_b.patch
          else
            echo "[+] 转换 HMBIRD_OGKI 到 HMBIRD_GKI"
            cp hmbird_patch.c kernel_workspace/kernel_platform/common/drivers/
            cd kernel_workspace/kernel_platform/common/drivers
            if ! grep -q "hmbird_patch.o" Makefile; then
              echo "obj-y += hmbird_patch.o" >> Makefile
            fi
          fi

      - name: Setup KSU
        id: ksu
        run: |
          if [ "${{ inputs.ksu_version }}" = "none" ]; then
            echo "[+] 跳过 KernelSU 集成"
            echo "ksu_version_actual=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          cd kernel_workspace/kernel_platform/common
          
          if [ -z "${{ inputs.ksu_version }}" ] || [ "${{ inputs.ksu_version }}" = "latest" ]; then
            echo "[+] 安装最新稳定版的 KernelSU"
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          else
            echo "[+] 安装指定版本的 KernelSU: ${{ inputs.ksu_version }}"
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ inputs.ksu_version }}
          fi

          # 添加对 Mountify (backslashxx/mountify) 模块的支持
          echo "CONFIG_TMPFS_XATTR=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./arch/arm64/configs/gki_defconfig

          cd KernelSU
          KSU_VERSION=$(git describe --tags 2>/dev/null || git rev-parse --short HEAD)
          echo "ksu_version_actual=$KSU_VERSION" >> $GITHUB_OUTPUT

      - name: Enable ADIOS I/O Scheduler
        if: inputs.enable_adios
        run: |
          wget https://raw.githubusercontent.com/qdykernel/Build_Oneplus_Realme_Action/refs/heads/main/.github/workflows/tools/adios_ioscheduler_6.6.patch
          patch -d kernel_workspace/kernel_platform/common -p1 -F 3 < adios_ioscheduler_6.6.patch

          cd kernel_workspace/kernel_platform/common
          {
            echo "CONFIG_MQ_IOSCHED_ADIOS=y"
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y"
          } >> ./arch/arm64/configs/gki_defconfig

      - name: Add iptables extensions
        if: ${{ inputs.better_net }}
        run: |
          cd kernel_workspace/kernel_platform/common
          {
            echo "CONFIG_BPF_STREAM_PARSER=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_SET=y"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_IP_SET_MAX=65534"
            echo "CONFIG_IP_SET_BITMAP_IP=y"
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y"
            echo "CONFIG_IP_SET_BITMAP_PORT=y"
            echo "CONFIG_IP_SET_HASH_IP=y"
            echo "CONFIG_IP_SET_HASH_IPMARK=y"
            echo "CONFIG_IP_SET_HASH_IPPORT=y"
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y"
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y"
            echo "CONFIG_IP_SET_HASH_IPMAC=y"
            echo "CONFIG_IP_SET_HASH_MAC=y"
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y"
            echo "CONFIG_IP_SET_HASH_NET=y"
            echo "CONFIG_IP_SET_HASH_NETNET=y"
            echo "CONFIG_IP_SET_HASH_NETPORT=y"
            echo "CONFIG_IP_SET_HASH_NETIFACE=y"
            echo "CONFIG_IP_SET_LIST_SET=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          } >> ./arch/arm64/configs/gki_defconfig

      - name: Setup Droidspaces
        if: ${{ inputs.enable_Droidspaces }}
        run: |
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          patch -d kernel_workspace/kernel_platform/common -p1 -F 3 < 001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          cd kernel_workspace/kernel_platform/common
          {
            echo "CONFIG_SYSVIPC=y"
            echo "CONFIG_POSIX_MQUEUE=y"
            echo "CONFIG_IPC_NS=y"
            echo "CONFIG_PID_NS=y"
            echo "CONFIG_DEVTMPFS=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_TARGET_REJECT=y"
            echo "CONFIG_NETFILTER_XT_TARGET_LOG=y"
            echo "CONFIG_NETFILTER_XT_MATCH_RECENT=y"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_IP_SET_HASH_IP=y"
            echo "CONFIG_IP_SET_HASH_NET=y"
            echo "CONFIG_NETFILTER_XT_SET=y"
          } >> ./arch/arm64/configs/gki_defconfig

      - name: Setup NTsync
        if: ${{ inputs.enable_Droidspaces && inputs.enable_ntsync }}
        run: |
          wget https://raw.githubusercontent.com/Goldzxcbug/Droidspaces_Kernel_patch/refs/heads/main/NTsync/ntsync_base.patch
          wget https://raw.githubusercontent.com/Goldzxcbug/Droidspaces_Kernel_patch/refs/heads/main/NTsync/ntsync_compat_android15-6.6.patch

          patch -d kernel_workspace/kernel_platform/common -p1 -F 3 < ntsync_base.patch
          patch -d kernel_workspace/kernel_platform/common -p1 -F 3 < ntsync_compat_android15-6.6.patch
 
          echo "CONFIG_NTSYNC=y" >> kernel_workspace/kernel_platform/common/arch/arm64/configs/gki_defconfig

      - name: Setup Baseband-guard
        if: ${{ inputs.baseband_guard }}
        run: |
          cd kernel_workspace/kernel_platform/common
          curl -LSs "https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh" | bash
          echo "CONFIG_BBG=y" >> ./arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig

      - name: Other tasks
        run: |
          cd kernel_workspace/kernel_platform/common
          # 开启 O2 编译优化配置
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./arch/arm64/configs/gki_defconfig
          # 禁用 defconfig 检查
          sed -i 's/check_defconfig//' ./build.config.gki

      - name: Rename make name
        run: |
          cd kernel_workspace/kernel_platform/common
          sed -i 's/${scm_version}//' ./scripts/setlocalversion
          sed -i 's/-4k//g' ./arch/arm64/configs/gki_defconfig

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-oneplus-13t-

      - name: Build Kernel
        run: |
          cd kernel_workspace/kernel_platform/common
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin:$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin:$PATH"

          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M "${{ env.CCACHE_MAXSIZE }}"

          ccache -z
          echo "=== 构建前 CCache 状态 ==="
          ccache -s

          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC="ccache clang" PAHOLE=pahole LD=ld.lld HOSTLD=ld.lld \
          O=out gki_defconfig

          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC="ccache clang" PAHOLE=pahole LD=ld.lld HOSTLD=ld.lld KCFLAGS+=-O2 KCFLAGS+=-Wno-error \
          O=out Image

          echo "=== 构建后 CCache 状态 ==="
          ccache -s

      - name: Save ccache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-oneplus-13t-${{ github.run_id }}

      - name: Make AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3.git --depth=1
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/
          # tree kernel_workspace/kernel_platform/common/out/arch/arm64/ > ./AnyKernel3/tree.txt || true

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v7
        with:
          name: PKX110_AnyKernel3_ksu_${{ steps.ksu.outputs.ksu_version_actual }}${{ inputs.Apply_SCHED && '_sched' || '' }}${{ inputs.enable_adios && '_adios' || '' }}${{ inputs.better_net && '_net' || '' }}${{ inputs.enable_Droidspaces && (inputs.enable_ntsync && '_droid+ntsync' || '_droid') || '' }}${{ inputs.baseband_guard && '_bbg' || '' }}
          path: ./AnyKernel3/*
