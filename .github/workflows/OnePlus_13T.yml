name: OnePlus 13T Kernel Build

on:
  workflow_dispatch:
    inputs:
      pull_kernel_src:
        description: "是否拉取远程内核源码(否则使用缓存)"
        required: false
        type: boolean
        default: false
      Apply_SCHED:
        description: "是否添加风驰驱动"
        required: false
        type: boolean
        default: false
      better_net:
        description: "是否开启网络功能增强配置"
        required: false
        type: boolean
        default: false
      baseband_guard:
        description: "是否开启内核级基带保护"
        required: true
        type: boolean
        default: false
      adocker:
        description: "是否开启 Docker 支持"
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: OnePlus 13T Kernel Build
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "none"
      CCACHE_COMPRESS: "1"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_DIR: ${{ github.workspace }}/.ccache_oneplus_13t
      CCACHE_MAXSIZE: "3G"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y --no-install-recommends libelf-dev tree dos2unix ccache

      - name: Cache prebuilts (clang & build-tools)
        id: prebuilts-cache
        uses: actions/cache@v4
        with:
          path: |
            kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928
            kernel_workspace/kernel_platform/prebuilts/kernel-build-tools/linux-x86
          key: prebuilts-${{ runner.os }}-v1      

      - name: Cache ccache
        id: ccache-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-oneplus-13t-noksu-v1
          restore-keys: 
            ccache-${{ runner.os }}-oneplus-13t-noksu-v1-

      - name: Configure Git and repo
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/sm8750 -m oneplus_13t_b.xml --depth=1
         
          rm -rf kernel_platform/common
         
          echo "Starting repo sync..."
          repo sync kernel_platform/common \
            -c --force-sync --no-tags --no-clone-bundle \
            -j$(nproc --all)
         
          if [ "${{ steps.prebuilts-cache.outputs.cache-hit }}" = "false" ]; then
            repo sync kernel_platform/prebuilts/clang/host/linux-x86 \
                      kernel_platform/prebuilts/kernel-build-tools \
              -c --force-sync --no-tags --no-clone-bundle \
              -j$(nproc --all)
          fi

          rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"

      # OGKI 转换 GKI，无需修改 dtbo 开机
      - name: Apply Convert HMBIRD_OGKI to HMBIRD_GKI
        if: ${{ !inputs.Apply_SCHED }}
        run: |
          cp hmbird_patch.c kernel_workspace/kernel_platform/common/drivers/
          cd kernel_workspace/kernel_platform/common/drivers
          if ! grep -q "hmbird_patch.o" Makefile; then
            echo "obj-y += hmbird_patch.o" >> Makefile
          fi

      - name: Apply SCHED
        if: ${{ inputs.Apply_SCHED }}
        run: |
          git clone https://github.com/Numbersf/SCHED_PATCH.git -b sm8750
          dos2unix SCHED_PATCH/fengchi_oneplus_13t_b.patch
          patch -d kernel_workspace/kernel_platform/common -p1 -F 3 < SCHED_PATCH/fengchi_oneplus_13t_b.patch

      - name: Add iptables extensions
        if: ${{ inputs.better_net }}
        run: |
          cd kernel_workspace/kernel_platform/common
          {
            echo "CONFIG_BPF_STREAM_PARSER=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_SET=y"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_IP_SET_MAX=65534"
            echo "CONFIG_IP_SET_BITMAP_IP=y"
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y"
            echo "CONFIG_IP_SET_BITMAP_PORT=y"
            echo "CONFIG_IP_SET_HASH_IP=y"
            echo "CONFIG_IP_SET_HASH_IPMARK=y"
            echo "CONFIG_IP_SET_HASH_IPPORT=y"
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y"
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y"
            echo "CONFIG_IP_SET_HASH_IPMAC=y"
            echo "CONFIG_IP_SET_HASH_MAC=y"
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y"
            echo "CONFIG_IP_SET_HASH_NET=y"
            echo "CONFIG_IP_SET_HASH_NETNET=y"
            echo "CONFIG_IP_SET_HASH_NETPORT=y"
            echo "CONFIG_IP_SET_HASH_NETIFACE=y"
            echo "CONFIG_IP_SET_LIST_SET=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          } >> ./arch/arm64/configs/gki_defconfig

      - name: Setup Baseband-guard
        if: ${{ inputs.baseband_guard }}
        run: |
          cd kernel_workspace/kernel_platform/common
          curl -LSs "https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh" | bash
          echo "CONFIG_BBG=y" >> ./arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig

      - name: Setup Docker
        if: ${{ inputs.adocker }}
        run: |
          cp -rf docker kernel_workspace/kernel_platform/common/
          cd kernel_workspace/kernel_platform/common/
          sed -i "/endmenu/i\source \"docker/Kconfig\"" ./arch/arm64/Kconfig
          echo "CONFIG_DOCKER=y" >> ./arch/arm64/configs/gki_defconfig

      - name: Other tasks
        run: |
          cd kernel_workspace/kernel_platform/common
          
          echo "CONFIG_HEADERS_INSTALL=n" >> ./arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./arch/arm64/configs/gki_defconfig
         
          sed -i 's/check_defconfig//' ./build.config.gki

      - name: Rename make name
        run: |
          cd kernel_workspace/kernel_platform/common
          sed -i 's/${scm_version}//' ./scripts/setlocalversion
          sed -i 's/-4k//g' ./arch/arm64/configs/gki_defconfig

      - name: Build Kernel
        run: |
          cd kernel_workspace/kernel_platform/common
          
          echo "=== Setting up Build Environment ==="
          
          # 【核心修复】动态查找 Clang 目录，不再硬编码 "clang-r510928"
          # 在 ../prebuilts 目录下寻找以 clang-r 开头的文件夹，取版本最新的一个
          CLANG_DIR=$(find ../prebuilts/clang/host/linux-x86 -maxdepth 1 -type d -name "clang-r*" | sort -r | head -n 1)
          
          if [ -z "$CLANG_DIR" ]; then
            echo "❌ Error: 无法找到 Clang 目录！请检查 repo sync prebuilts 是否成功。"
            exit 1
          fi
          
          echo "✅ 自动检测到 Clang 目录: $CLANG_DIR"
          
          # 【参考你的成功脚本】设置 PATH
          # 包含 Clang bin 和 Google 提供的 build-tools (里面有 ld.lld)
          export PATH="$CLANG_DIR/bin:../prebuilts/kernel-build-tools/linux-x86/bin:$PATH"
          
          # 验证环境
          echo "Using Compiler:"
          clang --version
          
          if ! command -v ld.lld &> /dev/null; then
             echo "❌ Error: ld.lld 未找到！PATH 设置可能有误。"
             echo "Current PATH: $PATH"
             exit 1
          fi

          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M "${{ env.CCACHE_MAXSIZE }}"
          ccache -z
          
          echo "=== 开始编译 ==="

          # 【参考你的成功脚本】添加 LLVM_IAS=1 (集成汇编器)，这通常能提高兼容性
          make -j$(nproc --all) \
            LLVM=1 \
            LLVM_IAS=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" \
            PAHOLE=pahole \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out gki_defconfig

          make -j$(nproc --all) \
            LLVM=1 \
            LLVM_IAS=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" \
            PAHOLE=pahole \
            LD=ld.lld \
            HOSTLD=ld.lld \
            KCFLAGS+=-O2 \
            KCFLAGS+=-Wno-error \
            O=out all

          git restore . || true
          git clean -fd || true

          echo "=== CCache 统计 ==="
          ccache -s


      - name: Make AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3.git --depth=1
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: PKX110_AnyKernel3_NoKSU${{ inputs.Apply_SCHED && '_sched' || '' }}${{ inputs.better_net && '_ipt' || '' }}${{ inputs.baseband_guard && '_bbg' || '' }}${{ inputs.adocker && '_docker' || '' }}
          path: ./AnyKernel3/*

      - name: Extract All Kernel Modules
        run: |
          mkdir -p ./all_modules
          tree kernel_workspace/kernel_platform/common/out/ > ./all_modules/tree.txt || true
          cd kernel_workspace/kernel_platform/common/out/
          find . -name "*.ko" -exec cp --parents {} ../../../../all_modules/ \;

      - name: Upload Modules Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: ./all_modules/

      - name: Force Save Ccache
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-oneplus-13t-noksu-v1-${{ github.run_id }}