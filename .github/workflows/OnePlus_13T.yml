name: OnePlus 13T Kernel Build

on:
  workflow_dispatch:
    inputs:
      pull_kernel_src:
        description: "是否强制重新拉取所有源码"
        required: false
        type: boolean
        default: false
      Apply_SCHED:
        description: "是否添加风驰驱动"
        required: false
        type: boolean
        default: false
      better_net:
        description: "是否开启网络功能增强配置"
        required: false
        type: boolean
        default: false
      nftables:
        description: "是否开启 nftables 支持"
        required: false
        type: boolean
        default: false
      rekernel:
        description: "是否开启 Re-Kernel 支持"
        required: false
        type: boolean
        default: false
      baseband_guard:
        description: "是否开启内核级基带保护"
        required: false
        type: boolean
        default: false
      adocker:
        description: "是否开启 Docker 支持"
        required: false
        type: boolean
        default: false

env:
  KERNEL_REPO: cctv18/android_kernel_common_oneplus_sm8750
  KERNEL_BRANCH: oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89
  TOOLCHAIN_REPO: cctv18/oneplus_sm8650_toolchain
  TOOLCHAIN_TAG: LLVM-Clang18-r510928
  CLANG_ZIP: clang-r510928.zip
  BUILDTOOLS_ZIP: build-tools.zip

jobs:
  build:
    name: OnePlus 13T Kernel Build
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "none"
      CCACHE_COMPRESS: "1"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_DIR: ${{ github.workspace }}/.ccache_oneplus_13t
      CCACHE_MAXSIZE: "3G"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-mark hold firefox
          sudo apt-mark hold libc-bin
          sudo apt purge man-db -y
          sudo apt-get install -y --no-install-recommends \
            libelf-dev tree dos2unix ccache lld pahole \
            libssl-dev binutils python-is-python3 aria2 zstd

      - name: Cache Kernel Source
        id: kernel-src-cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/common
          key: kernel-src-${{ runner.os }}-${{ env.KERNEL_BRANCH }}

      - name: Cache Toolchain
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: |
            kernel_workspace/clang18
            kernel_workspace/build-tools
          key: toolchain-${{ runner.os }}-${{ env.TOOLCHAIN_TAG }}

      - name: Cache ccache
        id: ccache-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-oneplus-13t-v1-${{ github.run_number }}
          restore-keys: |
            ccache-${{ runner.os }}-oneplus-13t-v1


      - name: Pull public ccache fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "本地 ccache 命中，跳过公共 ccache 拉取"
            exit 0
          fi
          echo "未命中本地缓存，尝试拉取公共 ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-6.6.89.tar.zst"
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache 2>/dev/null; then
            echo "成功下载 $FILE_NAME，正在解压..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            rm -f "$FILE_NAME"
            echo "公共 ccache 恢复完成"
          else
            echo "公共 ccache 中未找到对应文件，将进行全量编译"
          fi

      - name: Cache libfaketime
        id: libfaketime-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/libfakestat.so
            ${{ github.workspace }}/libfaketimeMT.so
          key: libfaketime-${{ runner.os }}-v1

      - name: Download kernel source
        if: ${{ steps.kernel-src-cache.outputs.cache-hit != 'true' || inputs.pull_kernel_src }}
        run: |
          mkdir -p kernel_workspace
          echo "=== 下载内核源码 ==="
          aria2c -s16 -x16 -k1M \
            https://github.com/${{ env.KERNEL_REPO }}/archive/refs/heads/${{ env.KERNEL_BRANCH }}.zip \
            -o common.zip
          unzip -q common.zip
          # 移动到正确目录
          SRC_DIR=$(find . -maxdepth 1 -type d -name "android_kernel_common_oneplus_sm8750-*" | head -1)
          mv "$SRC_DIR" kernel_workspace/common
          rm common.zip
          # 去除 ABI 保护 & dirty 后缀
          rm kernel_workspace/common/android/abi_gki_protected_exports_* || true
          for f in kernel_workspace/common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: Download toolchain
        if: ${{ steps.toolchain-cache.outputs.cache-hit != 'true' || inputs.pull_kernel_src }}
        run: |
          mkdir -p kernel_workspace
          echo "=== 下载 Clang18 工具链 ==="
          aria2c -s16 -x16 -k1M \
            https://github.com/${{ env.TOOLCHAIN_REPO }}/releases/download/${{ env.TOOLCHAIN_TAG }}/${{ env.CLANG_ZIP }} \
            -o clang.zip &
          aria2c -s16 -x16 -k1M \
            https://github.com/${{ env.TOOLCHAIN_REPO }}/releases/download/${{ env.TOOLCHAIN_TAG }}/${{ env.BUILDTOOLS_ZIP }} \
            -o build-tools.zip &
          wait
          mkdir -p kernel_workspace/clang18
          unzip -q clang.zip -d kernel_workspace/clang18
          unzip -q build-tools.zip -d kernel_workspace
          rm clang.zip build-tools.zip

      - name: Build libfaketime
        if: ${{ steps.libfaketime-cache.outputs.cache-hit != 'true' }}
        run: |
          git clone --depth=1 https://github.com/wolfcw/libfaketime
          cd libfaketime
          make -j$(nproc)
          cp src/libfaketime.so.1 ${{ github.workspace }}/libfakestat.so
          make -j$(nproc) FAKETIME_MT=1
          cp src/libfaketimeMT.so.1 ${{ github.workspace }}/libfaketimeMT.so
          echo "✅ libfaketime 编译完成"
          ls -lh ${{ github.workspace }}/libfakestat.so ${{ github.workspace }}/libfaketimeMT.so

      - name: Apply Convert HMBIRD_OGKI to HMBIRD_GKI
        if: ${{ !inputs.Apply_SCHED }}
        run: |
          cp hmbird_patch.c kernel_workspace/common/drivers/
          cd kernel_workspace/common/drivers
          if ! grep -q "hmbird_patch.o" Makefile; then
            echo "obj-y += hmbird_patch.o" >> Makefile
          fi

      - name: Apply SCHED
        if: ${{ inputs.Apply_SCHED }}
        run: |
          git clone https://github.com/Numbersf/SCHED_PATCH.git -b sm8750
          dos2unix SCHED_PATCH/fengchi_oneplus_13t_b.patch
          patch -d kernel_workspace/common -p1 -F 3 < SCHED_PATCH/fengchi_oneplus_13t_b.patch || true

      - name: Add iptables extensions
        if: ${{ inputs.better_net }}
        run: |
          cd kernel_workspace/common
          {
            echo "CONFIG_BPF_STREAM_PARSER=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_SET=y"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_IP_SET_MAX=65534"
            echo "CONFIG_IP_SET_BITMAP_IP=y"
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y"
            echo "CONFIG_IP_SET_BITMAP_PORT=y"
            echo "CONFIG_IP_SET_HASH_IP=y"
            echo "CONFIG_IP_SET_HASH_IPMARK=y"
            echo "CONFIG_IP_SET_HASH_IPPORT=y"
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y"
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y"
            echo "CONFIG_IP_SET_HASH_IPMAC=y"
            echo "CONFIG_IP_SET_HASH_MAC=y"
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y"
            echo "CONFIG_IP_SET_HASH_NET=y"
            echo "CONFIG_IP_SET_HASH_NETNET=y"
            echo "CONFIG_IP_SET_HASH_NETPORT=y"
            echo "CONFIG_IP_SET_HASH_NETIFACE=y"
            echo "CONFIG_IP_SET_LIST_SET=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          } >> ./arch/arm64/configs/gki_defconfig

      - name: Add nftables support
        if: ${{ inputs.nftables }}
        run: |
          cd kernel_workspace/common
          sed -i '/# CONFIG_NF_TABLES is not set/d' ./arch/arm64/configs/gki_defconfig
          {
            echo "# nftables full support"
            echo "CONFIG_NF_TABLES=y"
            echo "CONFIG_NF_TABLES_INET=y"
            echo "CONFIG_NF_TABLES_IPV4=y"
            echo "CONFIG_NF_TABLES_IPV6=y"
            echo "CONFIG_NF_TABLES_ARP=y"
            echo "CONFIG_NFT_TPROXY=y"
            echo "CONFIG_NFT_SOCKET=y"
            echo "CONFIG_NFT_CT=y"
            echo "CONFIG_NFT_META=y"
            echo "CONFIG_NFT_FIB=y"
            echo "CONFIG_NFT_FIB_IPV4=y"
            echo "CONFIG_NFT_FIB_IPV6=y"
            echo "CONFIG_NFT_FIB_INET=y"
            echo "CONFIG_NFT_SET_HASH=y"
            echo "CONFIG_NFT_SET_RBTREE=y"
            echo "CONFIG_NFT_SET_BITMAP=y"
            echo "CONFIG_NFT_NAT=y"
            echo "CONFIG_NFT_REDIR=y"
            echo "CONFIG_NFT_LOG=y"
            echo "CONFIG_NFT_LIMIT=y"
            echo "CONFIG_NFT_REJECT=y"
            echo "CONFIG_NFT_REJECT_IPV4=y"
            echo "CONFIG_NFT_REJECT_IPV6=y"
            echo "CONFIG_NFT_COMPAT=y"
          } >> ./arch/arm64/configs/gki_defconfig

      - name: Add Re-Kernel support
        if: ${{ inputs.rekernel }}
        run: |
          echo "CONFIG_REKERNEL=y" >> kernel_workspace/common/arch/arm64/configs/gki_defconfig

      - name: Setup Baseband-guard
        if: ${{ inputs.baseband_guard }}
        run: |
          cd kernel_workspace/common
          curl -LSs "https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh" | bash
          echo "CONFIG_BBG=y" >> ./arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig

      - name: Setup Docker
        if: ${{ inputs.adocker }}
        run: |
          cp -rf docker kernel_workspace/common/
          cd kernel_workspace/common/
          sed -i "/endmenu/i\source \"docker/Kconfig\"" ./arch/arm64/Kconfig
          echo "CONFIG_DOCKER=y" >> ./arch/arm64/configs/gki_defconfig

      - name: Other tasks
        run: |
          cd kernel_workspace/common
          echo "CONFIG_HEADERS_INSTALL=n" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' ./build.config.gki

      - name: Rename make name
        run: |
          cd kernel_workspace/common
          sed -i 's/${scm_version}//' ./scripts/setlocalversion
          sed -i 's/-4k//g' ./arch/arm64/configs/gki_defconfig

      - name: Build Kernel
        run: |
          cd kernel_workspace/common

          WORKDIR="$(pwd)"
          CLANG_DIR="$GITHUB_WORKSPACE/kernel_workspace/clang18/bin"
          BUILDTOOLS_DIR="$GITHUB_WORKSPACE/kernel_workspace/build-tools/bin"
          export PATH="$CLANG_DIR:$BUILDTOOLS_DIR:$PATH"

          echo "Using Compiler: $(clang --version | head -1)"

          if ! command -v ld.lld &> /dev/null; then
            echo "❌ Error: ld.lld 未找到！"
            exit 1
          fi

          # 配置 ccache
          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M "${{ env.CCACHE_MAXSIZE }}"
          ccache -o compression=true
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "${{ env.CCACHE_DIR }}/ccache.conf"
          ccache -z

          # 配置时间劫持变量
          PRELOAD_LIBS="${{ github.workspace }}/libfakestat.so ${{ github.workspace }}/libfaketimeMT.so"
          FAKESTAT="2025-05-25 12:00:00"
          FAKETIME="@2025-05-25 13:00:00"

          # 创建 CC 包装器（仅用于 kernel 对象编译，不用于 host 工具）
          cat > "$WORKDIR/cc-wrapper" << WRAPPER
          #!/bin/bash
          export LD_PRELOAD="$PRELOAD_LIBS"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          exec ccache clang "\$@"
          WRAPPER

          # 创建 LD 包装器
          cat > "$WORKDIR/ld-wrapper" << WRAPPER
          #!/bin/bash
          export LD_PRELOAD="$PRELOAD_LIBS"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          exec ld.lld "\$@"
          WRAPPER

          chmod +x "$WORKDIR/cc-wrapper" "$WORKDIR/ld-wrapper"

          # 后台清理不必要的大文件
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &

          echo "=== 开始编译 ==="
          df -h

          # 第一步：用系统 clang 生成 .config（避免 cc-wrapper 干扰 kconfig host 工具）
          make -j$(nproc --all) \
            LLVM=1 LLVM_IAS=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" \
            PAHOLE=pahole LD=ld.lld HOSTLD=ld.lld \
            KCFLAGS+=-Wno-error \
            O=out gki_defconfig

          # 第二步：用 cc-wrapper 注入时间劫持编译 Image
          make -j$(nproc --all) \
            LLVM=1 LLVM_IAS=1 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="$WORKDIR/cc-wrapper" \
            LD="$WORKDIR/ld-wrapper" \
            HOSTCC="ccache clang" \
            HOSTLD=ld.lld \
            PAHOLE=pahole \
            KCFLAGS+=-Wno-error \
            O=out Image

          echo "=== CCache 统计 ==="
          ccache -s
          echo "=== 编译后磁盘空间 ==="
          df -h

      - name: Make AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3.git --depth=1
          cp kernel_workspace/common/out/arch/arm64/boot/Image ./AnyKernel3/
          if [[ ! -f ./AnyKernel3/Image ]]; then
            echo "❌ 未找到内核镜像文件"
            exit 1
          fi

      - name: Extract All Kernel Modules
        run: |
          mkdir -p ./all_modules
          tree kernel_workspace/common/out/ > ./all_modules/tree.txt || true
          cd kernel_workspace/common/out/
          find . -name "*.ko" -exec cp --parents {} ../../../../all_modules/ \;

      - name: Upload Modules Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: ./all_modules/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-${{ github.run_number }}-${{ github.run_attempt }}
          name: "OnePlus 13T Kernel #${{ github.run_number }}${{ inputs.Apply_SCHED && ' +sched' || '' }}${{ inputs.better_net && ' +ipt' || '' }}${{ inputs.nftables && ' +nft' || '' }}${{ inputs.rekernel && ' +rekernel' || '' }}${{ inputs.baseband_guard && ' +bbg' || '' }}${{ inputs.adocker && ' +docker' || '' }}"
          body: |
            ## OnePlus 13T Kernel Build

            | 选项 | 状态 |
            |---|---|
            | 风驰调度 | ${{ inputs.Apply_SCHED && '✅' || '❌' }} |
            | 网络增强 (ipset) | ${{ inputs.better_net && '✅' || '❌' }} |
            | nftables | ${{ inputs.nftables && '✅' || '❌' }} |
            | Re-Kernel | ${{ inputs.rekernel && '✅' || '❌' }} |
            | 基带保护 | ${{ inputs.baseband_guard && '✅' || '❌' }} |
            | Docker | ${{ inputs.adocker && '✅' || '❌' }} |
          files: ./AnyKernel3/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Save Ccache
        if: ${{ steps.ccache-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-oneplus-13t-v1-${{ github.run_id }}
